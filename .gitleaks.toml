# Gitleaks configuration for Agent Orchestrator
# Prevents accidental commits of secrets, API keys, tokens, etc.

title = "Agent Orchestrator Secret Scanning"

# Use all default gitleaks rules
[extend]
useDefault = true

# Allowlist to ignore false positives
[allowlist]
description = "Allowlisted patterns"

paths = [
  "node_modules/",
  "dist/",
  ".next/",
  "coverage/",
  "pnpm-lock.yaml",
  # Test fixtures use fake token-shaped strings to verify redaction logic.
  # Real secrets never live in test files.
  "__tests__/",
  "\\.test\\.ts$",
  "\\.test\\.tsx$",
  "\\.integration\\.test\\.ts$",
]

regexes = [
  # Environment variable references
  "\\$\\{[A-Z_]+\\}",

  # Placeholder values
  "your-api-key-here",
  "your-token-here",
  "example\\.com",

  # Model identifiers that can resemble generic keys
  "claude-3-5-sonnet",

]
